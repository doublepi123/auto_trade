services:
  backend:
    image: doublepi/auto-trade-backend:${AUTO_TRADE_IMAGE_TAG:-latest}
    pull_policy: always
    volumes:
      - ./data:/app/data
    environment:
      - AUTO_TRADE_ENV=${AUTO_TRADE_ENV:-prod}
      - AUTO_TRADE_DATABASE_URL=sqlite:////app/data/auto_trade.db
      - LONGPORT_APP_KEY=${LONGPORT_APP_KEY:-}
      - LONGPORT_APP_SECRET=${LONGPORT_APP_SECRET:-}
      - LONGPORT_ACCESS_TOKEN=${LONGPORT_ACCESS_TOKEN:-}
      - LONGBRIDGE_APP_KEY=${LONGBRIDGE_APP_KEY:-}
      - LONGBRIDGE_APP_SECRET=${LONGBRIDGE_APP_SECRET:-}
      - LONGBRIDGE_ACCESS_TOKEN=${LONGBRIDGE_ACCESS_TOKEN:-}
      - AUTO_TRADE_SCT_KEY=${AUTO_TRADE_SCT_KEY:-}
      - AUTO_TRADE_API_KEY=${AUTO_TRADE_API_KEY:?Set AUTO_TRADE_API_KEY in .env before starting Docker Compose}
      - AUTO_TRADE_AUDIT_TRUSTED_PROXY_CIDRS=${AUTO_TRADE_AUDIT_TRUSTED_PROXY_CIDRS:-172.16.0.0/12}
      - AUTO_TRADE_BROKER_POSITION_SNAPSHOT_ISOLATION_ENABLED=${AUTO_TRADE_BROKER_POSITION_SNAPSHOT_ISOLATION_ENABLED:-true}
      - AUTO_TRADE_BROKER_POSITION_SNAPSHOT_TIMEOUT_SECONDS=${AUTO_TRADE_BROKER_POSITION_SNAPSHOT_TIMEOUT_SECONDS:-8}
      - CREDENTIAL_MASTER_KEY=${CREDENTIAL_MASTER_KEY:-}
      - AUTO_TRADE_LLM_PROVIDER=${AUTO_TRADE_LLM_PROVIDER:-deepseek}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-}
      - MINIMAX_BASE_URL=${MINIMAX_BASE_URL:-https://api.minimaxi.com/v1}
      - MINIMAX_API_URL=${MINIMAX_API_URL:-}
      - MINIMAX_API_KEY=${MINIMAX_API_KEY:-}
      - MINIMAX_MODEL=${MINIMAX_MODEL:-MiniMax-M3}
      - MINIMAX_THINKING_TYPE=${MINIMAX_THINKING_TYPE:-adaptive}
      - MINIMAX_MAX_COMPLETION_TOKENS=${MINIMAX_MAX_COMPLETION_TOKENS:-8192}
      - AUTO_TRADE_LLM_INTERACTION_RETENTION_DAYS=${AUTO_TRADE_LLM_INTERACTION_RETENTION_DAYS:-90}
      - AUTO_TRADE_LLM_NO_ACTION_RETENTION_DAYS=${AUTO_TRADE_LLM_NO_ACTION_RETENTION_DAYS:-14}
      - AUTO_TRADE_LLM_CONTEXT_SNAPSHOT_MAX_BYTES=${AUTO_TRADE_LLM_CONTEXT_SNAPSHOT_MAX_BYTES:-16384}
      - AUTO_TRADE_LLM_STORAGE_MAINTENANCE_INTERVAL_MINUTES=${AUTO_TRADE_LLM_STORAGE_MAINTENANCE_INTERVAL_MINUTES:-360}
      - AUTO_TRADE_LLM_STORAGE_MAINTENANCE_BATCH_SIZE=${AUTO_TRADE_LLM_STORAGE_MAINTENANCE_BATCH_SIZE:-250}
      - AUTO_TRADE_LLM_MIN_CONFIDENCE=${AUTO_TRADE_LLM_MIN_CONFIDENCE:-0.7}
      - AUTO_TRADE_LLM_MAX_STRIPE_WIDTH_PCT=${AUTO_TRADE_LLM_MAX_STRIPE_WIDTH_PCT:-8.0}
      - AUTO_TRADE_LLM_MAX_INTERVAL_BOUND_DEVIATION_PCT=${AUTO_TRADE_LLM_MAX_INTERVAL_BOUND_DEVIATION_PCT:-5.0}
      # P0 defaults remain fail-closed. Full buying-power sizing is an explicit,
      # false-by-default paper-account exception; shorting/add-ons stay locked.
      - AUTO_TRADE_LLM_SHADOW_MODE=true
      - AUTO_TRADE_LLM_MAX_ORDER_PRICE_DEVIATION_PCT=${AUTO_TRADE_LLM_MAX_ORDER_PRICE_DEVIATION_PCT:-1.0}
      - AUTO_TRADE_ALLOW_SHORT_ENTRIES=false
      - AUTO_TRADE_HARD_ALLOW_POSITION_ADDONS=false
      - AUTO_TRADE_HARD_MAX_POSITION_QUANTITY=${AUTO_TRADE_HARD_MAX_POSITION_QUANTITY:-100}
      - AUTO_TRADE_HARD_MAX_POSITION_NOTIONAL=${AUTO_TRADE_HARD_MAX_POSITION_NOTIONAL:-5000}
      - AUTO_TRADE_HARD_MAX_RISK_PER_TRADE=${AUTO_TRADE_HARD_MAX_RISK_PER_TRADE:-250}
      - AUTO_TRADE_FULL_BUYING_POWER_USAGE_ENABLED=${AUTO_TRADE_FULL_BUYING_POWER_USAGE_ENABLED:-false}
      - AUTO_TRADE_ENTRY_ROUND_TRIP_SLIPPAGE_BPS=${AUTO_TRADE_ENTRY_ROUND_TRIP_SLIPPAGE_BPS:-4}
      - AUTO_TRADE_MIN_ENTRY_EDGE_COST_RATIO=${AUTO_TRADE_MIN_ENTRY_EDGE_COST_RATIO:-2}
      - AUTO_TRADE_UNIVERSE_SELECTION_ENABLED=${AUTO_TRADE_UNIVERSE_SELECTION_ENABLED:-false}
      - AUTO_TRADE_UNIVERSE_SELECTION_APPLY_TO_WATCHLIST=${AUTO_TRADE_UNIVERSE_SELECTION_APPLY_TO_WATCHLIST:-false}
      - AUTO_TRADE_UNIVERSE_SELECTION_ENABLE_SHADOW=${AUTO_TRADE_UNIVERSE_SELECTION_ENABLE_SHADOW:-false}
      - AUTO_TRADE_OPENING_MOMENTUM_SHADOW_ENABLED=${AUTO_TRADE_OPENING_MOMENTUM_SHADOW_ENABLED:-false}
      - AUTO_TRADE_OPENING_MOMENTUM_CHALLENGER_ENABLED=${AUTO_TRADE_OPENING_MOMENTUM_CHALLENGER_ENABLED:-false}
      - AUTO_TRADE_UNIVERSE_SELECTION_INTERVAL_MINUTES=${AUTO_TRADE_UNIVERSE_SELECTION_INTERVAL_MINUTES:-60}
      - AUTO_TRADE_WATCHLIST_QUANT_AUTO_SCORE_ENABLED=${AUTO_TRADE_WATCHLIST_QUANT_AUTO_SCORE_ENABLED:-false}
      - AUTO_TRADE_WATCHLIST_QUANT_INTERVAL_MINUTES=${AUTO_TRADE_WATCHLIST_QUANT_INTERVAL_MINUTES:-30}
      - AUTO_TRADE_WATCHLIST_QUANT_SCORE_TTL_MINUTES=${AUTO_TRADE_WATCHLIST_QUANT_SCORE_TTL_MINUTES:-1440}
      - AUTO_TRADE_WATCHLIST_QUANT_BATCH_SIZE=${AUTO_TRADE_WATCHLIST_QUANT_BATCH_SIZE:-3}
      - AUTO_TRADE_UNIVERSE_SELECTION_MAX_SYMBOLS=${AUTO_TRADE_UNIVERSE_SELECTION_MAX_SYMBOLS:-12}
      - AUTO_TRADE_UNIVERSE_SELECTION_MAX_PER_SECTOR=${AUTO_TRADE_UNIVERSE_SELECTION_MAX_PER_SECTOR:-2}
      - AUTO_TRADE_UNIVERSE_SELECTION_MIN_EVALUABLE_RATIO=${AUTO_TRADE_UNIVERSE_SELECTION_MIN_EVALUABLE_RATIO:-0.60}
      - AUTO_TRADE_UNIVERSE_SELECTION_MIN_RESIDENCY_DAYS=${AUTO_TRADE_UNIVERSE_SELECTION_MIN_RESIDENCY_DAYS:-2}
      - AUTO_TRADE_UNIVERSE_SELECTION_MIN_PRICE=${AUTO_TRADE_UNIVERSE_SELECTION_MIN_PRICE:-10}
      - AUTO_TRADE_UNIVERSE_SELECTION_MIN_AVG_DOLLAR_VOLUME=${AUTO_TRADE_UNIVERSE_SELECTION_MIN_AVG_DOLLAR_VOLUME:-500000000}
      - AUTO_TRADE_UNIVERSE_SELECTION_MAX_SPREAD_BPS=${AUTO_TRADE_UNIVERSE_SELECTION_MAX_SPREAD_BPS:-15}
      - AUTO_TRADE_UNIVERSE_SELECTION_MIN_REALIZED_VOL=${AUTO_TRADE_UNIVERSE_SELECTION_MIN_REALIZED_VOL:-0.15}
      - AUTO_TRADE_UNIVERSE_SELECTION_MAX_REALIZED_VOL=${AUTO_TRADE_UNIVERSE_SELECTION_MAX_REALIZED_VOL:-1.20}
      - AUTO_TRADE_UNIVERSE_SELECTION_MIN_ATR_PCT=${AUTO_TRADE_UNIVERSE_SELECTION_MIN_ATR_PCT:-0.75}
      - AUTO_TRADE_UNIVERSE_SELECTION_MAX_ATR_PCT=${AUTO_TRADE_UNIVERSE_SELECTION_MAX_ATR_PCT:-8}
      - AUTO_TRADE_LIVE_REGIME_GATE_ENABLED=${AUTO_TRADE_LIVE_REGIME_GATE_ENABLED:-false}
      - AUTO_TRADE_LIVE_REGIME_MAX_DATA_AGE_SECONDS=${AUTO_TRADE_LIVE_REGIME_MAX_DATA_AGE_SECONDS:-600}
      - AUTO_TRADE_LIVE_MAX_ENTRIES_PER_SYMBOL_PER_DAY=${AUTO_TRADE_LIVE_MAX_ENTRIES_PER_SYMBOL_PER_DAY:-1}
      - AUTO_TRADE_HARD_STOP_LOSS_PCT=${AUTO_TRADE_HARD_STOP_LOSS_PCT:-1.0}
      - AUTO_TRADE_HARD_MAX_HOLDING_MINUTES=${AUTO_TRADE_HARD_MAX_HOLDING_MINUTES:-60}
      - AUTO_TRADE_HARD_ENTRY_CUTOFF_MINUTES_BEFORE_CLOSE=${AUTO_TRADE_HARD_ENTRY_CUTOFF_MINUTES_BEFORE_CLOSE:-45}
      - AUTO_TRADE_HARD_FLATTEN_MINUTES_BEFORE_CLOSE=${AUTO_TRADE_HARD_FLATTEN_MINUTES_BEFORE_CLOSE:-15}
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/api/ready', timeout=5).read()\"",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped

  frontend:
    image: doublepi/auto-trade-frontend:${AUTO_TRADE_IMAGE_TAG:-latest}
    pull_policy: always
    environment:
      - AUTO_TRADE_API_KEY=${AUTO_TRADE_API_KEY:?Set AUTO_TRADE_API_KEY in .env before starting Docker Compose}
    # DockerHub 镜像默认仅本机访问（127.0.0.1），公网/共享网络请保留此绑定；
    # 若需要局域网访问，在 .env 里覆盖 AUTO_TRADE_FRONTEND_BIND=0.0.0.0。
    # 端口映射写成 `${BIND}:${PORT}:80`：宿主机 ${BIND}:${PORT} 映射到容器 80。
    ports:
      - '${AUTO_TRADE_FRONTEND_BIND:-127.0.0.1}:${AUTO_TRADE_FRONTEND_PORT:-8080}:80'
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
