services:
  backend:
    build: ./backend
    volumes:
      - ./data:/app/data
    environment:
      - AUTO_TRADE_ENV=${AUTO_TRADE_ENV:-dev}
      - AUTO_TRADE_DATABASE_URL=sqlite:////app/data/auto_trade.db
      - LONGPORT_APP_KEY=${LONGPORT_APP_KEY:-}
      - LONGPORT_APP_SECRET=${LONGPORT_APP_SECRET:-}
      - LONGPORT_ACCESS_TOKEN=${LONGPORT_ACCESS_TOKEN:-}
      - LONGBRIDGE_APP_KEY=${LONGBRIDGE_APP_KEY:-}
      - LONGBRIDGE_APP_SECRET=${LONGBRIDGE_APP_SECRET:-}
      - LONGBRIDGE_ACCESS_TOKEN=${LONGBRIDGE_ACCESS_TOKEN:-}
      - AUTO_TRADE_SCT_KEY=${AUTO_TRADE_SCT_KEY:-}
      - AUTO_TRADE_API_KEY=${AUTO_TRADE_API_KEY:-}
      - CREDENTIAL_MASTER_KEY=${CREDENTIAL_MASTER_KEY:-}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-}
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health', timeout=5).read()\"",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        VITE_AUTO_TRADE_API_KEY: ${AUTO_TRADE_API_KEY:-}
    environment:
      - AUTO_TRADE_API_KEY=${AUTO_TRADE_API_KEY:-}
    # AUTO_TRADE_FRONTEND_BIND 控制宿主机上的绑定地址：
    #   - 0.0.0.0  → 暴露给所有网卡（默认；内网/演示环境，方便其他设备访问）
    #   - 127.0.0.1 → 仅本机访问（更安全，公网/共享网络请改为 127.0.0.1）
    # 端口映射写成 `${BIND}:${PORT}:80`：宿主机 ${BIND}:${PORT} 映射到容器 80。
    ports:
      - '${AUTO_TRADE_FRONTEND_BIND:-0.0.0.0}:${AUTO_TRADE_FRONTEND_PORT:-8080}:80'
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
