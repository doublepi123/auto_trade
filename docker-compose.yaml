services:
  backend:
    build: ./backend
    volumes:
      - ./data:/app/data
    environment:
      - AUTO_TRADE_ENV=${AUTO_TRADE_ENV:-prod}
      - AUTO_TRADE_DATABASE_URL=sqlite:////app/data/auto_trade.db
      - LONGPORT_APP_KEY=${LONGPORT_APP_KEY:-}
      - LONGPORT_APP_SECRET=${LONGPORT_APP_SECRET:-}
      - LONGPORT_ACCESS_TOKEN=${LONGPORT_ACCESS_TOKEN:-}
      - LONGBRIDGE_APP_KEY=${LONGBRIDGE_APP_KEY:-}
      - LONGBRIDGE_APP_SECRET=${LONGBRIDGE_APP_SECRET:-}
      - LONGBRIDGE_ACCESS_TOKEN=${LONGBRIDGE_ACCESS_TOKEN:-}
      - AUTO_TRADE_SCT_KEY=${AUTO_TRADE_SCT_KEY:-}
      - AUTO_TRADE_API_KEY=${AUTO_TRADE_API_KEY:?Set AUTO_TRADE_API_KEY before starting Docker Compose}
      - AUTO_TRADE_AUDIT_TRUSTED_PROXY_CIDRS=${AUTO_TRADE_AUDIT_TRUSTED_PROXY_CIDRS:-172.16.0.0/12}
      - CREDENTIAL_MASTER_KEY=${CREDENTIAL_MASTER_KEY:-}
      - AUTO_TRADE_LLM_PROVIDER=${AUTO_TRADE_LLM_PROVIDER:-deepseek}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-}
      - MINIMAX_BASE_URL=${MINIMAX_BASE_URL:-https://api.minimaxi.com/v1}
      - MINIMAX_API_URL=${MINIMAX_API_URL:-}
      - MINIMAX_API_KEY=${MINIMAX_API_KEY:-}
      - MINIMAX_MODEL=${MINIMAX_MODEL:-MiniMax-M3}
      - MINIMAX_THINKING_TYPE=${MINIMAX_THINKING_TYPE:-adaptive}
      - MINIMAX_MAX_COMPLETION_TOKENS=${MINIMAX_MAX_COMPLETION_TOKENS:-8192}
      - AUTO_TRADE_LLM_MIN_CONFIDENCE=${AUTO_TRADE_LLM_MIN_CONFIDENCE:-0.7}
      - AUTO_TRADE_LLM_MAX_STRIPE_WIDTH_PCT=${AUTO_TRADE_LLM_MAX_STRIPE_WIDTH_PCT:-8.0}
      - AUTO_TRADE_LLM_MAX_INTERVAL_BOUND_DEVIATION_PCT=${AUTO_TRADE_LLM_MAX_INTERVAL_BOUND_DEVIATION_PCT:-5.0}
      # P0 permanent safety locks; intentionally not overrideable from .env.
      - AUTO_TRADE_LLM_SHADOW_MODE=true
      - AUTO_TRADE_LLM_MAX_ORDER_PRICE_DEVIATION_PCT=${AUTO_TRADE_LLM_MAX_ORDER_PRICE_DEVIATION_PCT:-1.0}
      - AUTO_TRADE_ALLOW_SHORT_ENTRIES=false
      - AUTO_TRADE_HARD_ALLOW_POSITION_ADDONS=false
      - AUTO_TRADE_HARD_MAX_POSITION_QUANTITY=${AUTO_TRADE_HARD_MAX_POSITION_QUANTITY:-100}
      - AUTO_TRADE_HARD_MAX_POSITION_NOTIONAL=${AUTO_TRADE_HARD_MAX_POSITION_NOTIONAL:-5000}
      - AUTO_TRADE_HARD_MAX_RISK_PER_TRADE=${AUTO_TRADE_HARD_MAX_RISK_PER_TRADE:-250}
      - AUTO_TRADE_HARD_STOP_LOSS_PCT=${AUTO_TRADE_HARD_STOP_LOSS_PCT:-1.0}
      - AUTO_TRADE_HARD_MAX_HOLDING_MINUTES=${AUTO_TRADE_HARD_MAX_HOLDING_MINUTES:-60}
      - AUTO_TRADE_HARD_ENTRY_CUTOFF_MINUTES_BEFORE_CLOSE=${AUTO_TRADE_HARD_ENTRY_CUTOFF_MINUTES_BEFORE_CLOSE:-45}
      - AUTO_TRADE_HARD_FLATTEN_MINUTES_BEFORE_CLOSE=${AUTO_TRADE_HARD_FLATTEN_MINUTES_BEFORE_CLOSE:-15}
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/api/ready', timeout=5).read()\"",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    environment:
      - AUTO_TRADE_API_KEY=${AUTO_TRADE_API_KEY:?Set AUTO_TRADE_API_KEY before starting Docker Compose}
    # AUTO_TRADE_FRONTEND_BIND 控制宿主机上的绑定地址：
    #   - 127.0.0.1 → 仅本机访问（默认；更安全）
    #   - 0.0.0.0  → 暴露给所有网卡（如需局域网访问再手动覆盖）
    # 端口映射写成 `${BIND}:${PORT}:80`：宿主机 ${BIND}:${PORT} 映射到容器 80。
    ports:
      - '${AUTO_TRADE_FRONTEND_BIND:-127.0.0.1}:${AUTO_TRADE_FRONTEND_PORT:-8080}:80'
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
